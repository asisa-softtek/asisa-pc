name: Daily data refresh

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 1. Providers — localidades + centros + especialistas
        run: node generate-providers-data.mjs

      - name: 2. Provider details
        run: node generate-provider-details.mjs

      - name: 3. Speciality combos (sin llamadas a ASISA)
        run: node generate-specialities.mjs

      - name: 4. Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/valid-localidades.json \
                  data/valid-centros.json \
                  data/valid-especialistas.json \
                  data/centros-index.json \
                  data/especialistas-index.json \
                  data/valid-provincia-specs.json \
                  data/valid-municipio-specs.json \
                  data/valid-specialities.json \
                  data/providers/ \
                  data/provider-details/
          git diff --staged --quiet || (git commit -m "chore: daily data refresh [skip ci]" && git pull --rebase && git push)

      - name: 5. Refresh EDS pages
        run: node refresh-eds-pages.mjs
