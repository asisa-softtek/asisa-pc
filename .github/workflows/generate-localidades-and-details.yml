name: Daily data refresh

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forzar sobreescritura de caché (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 1. Providers — localidades + centros + especialistas
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: node generate-providers-data.mjs

      - name: 2. Provider details
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: node generate-provider-details.mjs

      - name: 3. Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: daily data refresh [skip ci]" && git pull --rebase && git push)

      - name: 4. Refresh EDS pages
        run: node refresh-eds-pages.mjs
