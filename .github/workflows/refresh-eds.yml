name: Refresh EDS pages

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh EDS preview and live pages
        run: node refresh-eds-pages.mjs
