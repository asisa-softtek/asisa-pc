name: Generate provider details

on:
  #schedule:
   # - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forzar sobreescritura de caché (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Provider details
        env:
          FORCE: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.force || 'false' }}
        run: node generate-provider-details.mjs

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/provider-details/
          git diff --staged --quiet || (git commit -m "chore: update provider details [skip ci]" && git pull --rebase && git push)
